name: Verify Web App

on:
  push:
    paths:
      - "index.html"
      - "styles.css"
      - "app.js"
      - "sw.js"
      - "manifest.webmanifest"
      - ".github/workflows/web-check.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript syntax
        run: node --check app.js

      - name: Confirm web files
        run: |
          test -f index.html
          test -f styles.css
          test -f sw.js
